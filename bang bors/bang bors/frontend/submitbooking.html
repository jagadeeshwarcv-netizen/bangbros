<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule Meeting - Bang Bros</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #8cb4ff;
            min-height: 100vh;
            padding: 20px;
        }

        .form-container {
            max-width: 600px;
            margin: 60px auto;
            background: #e4eef0;
            border: 2px solid #16232a;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            color: #16232a;
        }

        .form-container h2 {
            font-size: 28px;
            margin-bottom: 30px;
            text-align: center;
            color: #16232a;
        }

        label {
            font-weight: 600;
            display: block;
            margin-top: 20px;
            margin-bottom: 8px;
            color: #16232a;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border: 1px solid #16232a;
            border-radius: 8px;
            background: #ebebeb;
            color: #16232a;
            font-family: inherit;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        input::placeholder, textarea::placeholder {
            color: #999999;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            background: #ebebeb;
            border-color: #16232a;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }

        option {
            background: #ebebeb;
            color: #16232a;
        }

        button {
            margin-top: 30px;
            width: 100%;
            padding: 12px;
            background: #16232a;
            color: #ebebeb;
            border: 2px solid #16232a;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        button:hover {
            transform: translateY(-2px);
            background: #ebebeb;
            color: #16232a;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .success-message {
            background: #16232a;
            border: 2px solid #16232a;
            color: #ebebeb;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
            font-weight: 600;
        }

        .error-message {
            background: #ffffff;
            border: 2px solid #ff0000;
            color: #ff0000;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Schedule a Meeting</h2>
        
        <div id="successMessage" class="success-message"></div>
        <div id="errorMessage" class="error-message"></div>

        <form id="bookingForm">
            <label>Company Name:</label>
            <input type="text" name="company" placeholder="e.g. Tech Corp" required>

            <label>Select Applicant:</label>
            <select name="applicant_name" required>
                <option value="">-- Choose an Applicant Name --</option>
                <option value="C.V Jagadeeshwar">C.V Jagadeeshwar</option>
                <option value="J.Santhosh">J.Santhosh</option>
                <option value="Vanam Gangadhar Reddy">Vanam Gangadhar Reddy</option>
                <option value="KONDAMANENI DHANUSH KUMAR NAIDU">KONDAMANENI DHANUSH KUMAR NAIDU</option>
            </select>
            <label for="gmail">Gmail:</label>
            <select name="gmail" id="gmail">
                <option value="">-- Choose an Gmail --</option>
                <option value="jagadeshwar2014@gmail.com">jagadeshwar2014@gmail.com</option>
                <option value="santhosh@gmail.com">santhosh@gmail.com</option>
                <option value="vanam.gangadhar.reddy@gmail.com">gangadhareddy296@gmail.com</option>
                <option value="kondamani.dhanush.kumar.naidu@gmail.com">dhnaushnaidu56@gmail.com</option>

            </select>
            <label>Meeting Type:</label>
            <select name="meeting_type">
                <option value="Interview">Interview</option>
                <option value="Technical">Technical Interview</option>
                <option value="HR Interview">HR Interview</option>
                <option value="Selected for internship">Selected for internship</option>
                <option value="Selected for job">Selected for job</option>
            </select>

            <label>Date & Time:</label>
            <input type="datetime-local" name="meeting_time" required>

            <label>Meeting Link (Optional):</label>
            <input type="url" name="link" placeholder="https://zoom.us/j/...">

            <label>Additional Notes:</label>
            <textarea name="notes" rows="3" placeholder="Any specific instructions..."></textarea>

            <button type="submit">Submit Meeting</button>
        </form>
    </div>

    <script>
        document.getElementById('bookingForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const form = document.getElementById('bookingForm');
            const submitButton = form.querySelector('button[type="submit"]');
            const originalButtonText = submitButton.innerHTML;
            
            const formData = new FormData(form);
            const successDiv = document.getElementById('successMessage');
            const errorDiv = document.getElementById('errorMessage');

            // Hide messages
            successDiv.style.display = 'none';
            errorDiv.style.display = 'none';

            // Disable button and show loading state
            submitButton.disabled = true;
            submitButton.innerHTML = 'Submitting...';

            try {
                const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
                const backendURL = isLocal ? 'http://localhost:5000' : 'https://bangbro-s-i2g5.vercel.app/';
                const FRONTEND_URL = isLocal ? 'http://localhost:8000' : 'https://bangbro-s.vercel.app';
                const response = await fetch(backendURL + '/submitbooking', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.text();

                if (response.ok) {
                    successDiv.innerHTML = '✓ Meeting scheduled successfully! Redirecting...';
                    successDiv.style.display = 'block';
                    
                    // Reset form
                    form.reset();
                    
                    // Redirect after 2 seconds
                    setTimeout(() => {
                        window.location.href = FRONTEND_URL + '/';
                    }, 2000);
                } else {
                    errorDiv.innerHTML = '✗ Error: ' + result;
                    errorDiv.style.display = 'block';
                    // Re-enable button on error
                    submitButton.disabled = false;
                    submitButton.innerHTML = originalButtonText;
                }
            } catch (error) {
                errorDiv.innerHTML = '✗ Connection Error: Make sure backend is running';
                errorDiv.style.display = 'block';
                console.error('Error:', error);
                // Re-enable button on error
                submitButton.disabled = false;
                submitButton.innerHTML = originalButtonText;
            }
        });
     

    </script>
</body>
</html>
